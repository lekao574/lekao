<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>拖动物品游戏</title>

<style>

body{

    margin:0;
    padding:20px;

    background:#f5f3ec;

    font-family:
    "Microsoft YaHei",
    sans-serif;

}

#game{

    position:relative;

    width:1200px;

    height:760px;

    margin:auto;

}

#bg{

    position:absolute;

    left:0;
    top:0;

    width:1000px;

    user-select:none;

    pointer-events:none;

}

.item{

    position:absolute;

    width:120px;

    touch-action:none;

    user-select:none;

    cursor:pointer;

    z-index:100;

}

#bird{

    left:1040px;
    top:60px;

}

#snail{

    left:1040px;
    top:280px;

}

#grape{

    left:1040px;
    top:500px;

}

#checkBtn{

    position:absolute;

    left:330px;

    top:800px;

    width:220px;

    height:70px;

    border:none;

    border-radius:18px;

    background:#4CAF50;

    color:white;

    font-size:32px;

    font-weight:bold;

    cursor:pointer;

}

#checkBtn:active{

    transform:scale(0.96);

}

#resetBtn{

    position:absolute;

    left:580px;

    top:800px;

    width:220px;

    height:70px;

    border:none;

    border-radius:18px;

    background:#2196F3;

    color:white;

    font-size:32px;

    font-weight:bold;

    cursor:pointer;

}

#resetBtn:active{

    transform:scale(0.96);

}

#result{

    display:none;

    position:absolute;

    left:250px;

    top:250px;

    width:500px;

    text-align:center;

    font-size:70px;

    font-weight:bold;

    color:#ff6600;

    text-shadow:
    3px 3px 0 white;

    z-index:999;

}

</style>

</head>

<body>

<div id="game">

    <img
    id="bg"
    src="background.png">

    <img
    id="bird"
    class="item"
    src="bird.png">

    <img
    id="snail"
    class="item"
    src="snail.png">

    <img
    id="grape"
    class="item"
    src="grape.png">

    <div id="result"></div>

    <button id="checkBtn">
        检查答案
    </button>

    <button id="resetBtn">
        重新开始
    </button>


</div>

<script>

//////////////////////////////////////////////////
// 正确区域
//////////////////////////////////////////////////
const startPos = {

    bird:{
        left:1040,
        top:60
    },

    snail:{
        left:1040,
        top:280
    },

    grape:{
        left:1040,
        top:500
    }

};
const targets = {

    // 房子圆形鸟洞
    bird:{

        x:660,
        y:220,

        width:150,
        height:150
    },

    // 葡萄架
    grape:{

        x:40,
        y:40,

        width:720,
        height:220
    },

    // 草地
    snail:{

        x:0,
        y:280,

        width:1000,
        height:450
    }

};

//////////////////////////////////////////////////
// 拖拽
//////////////////////////////////////////////////

document
.querySelectorAll(".item")
.forEach(item=>{

    let dragging=false;

    let offsetX=0;
    let offsetY=0;

    item.addEventListener(
        "pointerdown",
        e=>{

            dragging=true;

            offsetX=
            e.clientX-
            item.offsetLeft;

            offsetY=
            e.clientY-
            item.offsetTop;

            item.setPointerCapture(
            e.pointerId);

        }
    );

    item.addEventListener(
        "pointermove",
        e=>{

            if(!dragging)
            return;

            item.style.left=
            (e.clientX-offsetX)
            +"px";

            item.style.top=
            (e.clientY-offsetY)
            +"px";

        }
    );

    item.addEventListener(
        "pointerup",
        ()=>{

            dragging=false;

        }
    );

});

//////////////////////////////////////////////////
// 判断物品是否进入区域
//////////////////////////////////////////////////

function inside(itemId){

    const item =
    document.getElementById(itemId);

    const t =
    targets[itemId];

    const centerX =
    item.offsetLeft +
    item.offsetWidth/2;

    const centerY =
    item.offsetTop +
    item.offsetHeight/2;

    return(

        centerX >= t.x &&
        centerX <= t.x+t.width &&

        centerY >= t.y &&
        centerY <= t.y+t.height

    );

}

//////////////////////////////////////////////////
// 检查答案
//////////////////////////////////////////////////

function checkAll(){

    const result =
    document.getElementById("result");

    result.style.display =
    "block";

    if(

        inside("bird") &&
        inside("grape") &&
        inside("snail")

    ){

        result.innerHTML =
        "🎉 完全正确！";

        result.style.color =
        "#00aa00";

    }

    else{

        result.innerHTML =
        "❌ 任务失败";

        result.style.color =
        "#ff3300";

    }

}
function resetGame(){

    document.getElementById("bird")
    .style.left =
    startPos.bird.left + "px";

    document.getElementById("bird")
    .style.top =
    startPos.bird.top + "px";

    document.getElementById("snail")
    .style.left =
    startPos.snail.left + "px";

    document.getElementById("snail")
    .style.top =
    startPos.snail.top + "px";

    document.getElementById("grape")
    .style.left =
    startPos.grape.left + "px";

    document.getElementById("grape")
    .style.top =
    startPos.grape.top + "px";

    document.getElementById("result")
    .style.display = "none";

    document.getElementById("result")
    .innerHTML = "";

}
//////////////////////////////////////////////////
// 按钮事件
//////////////////////////////////////////////////

document
.getElementById("checkBtn")
.addEventListener(
"click",
checkAll
);

document
.getElementById("resetBtn")
.addEventListener(
"click",
resetGame
);
</script>

</body>
</html>
